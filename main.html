<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main | Github Issue Tracker</title>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap');

        *{
            font-family: "Geist", sans-serif;
        }

    </style>
</head>
<body class="bg-[#F8FAFC] min-h-[945px]">
    <header>
        <nav class="h-18 px-15 flex items-center justify-between shadow-xs bg-white">
            <div class="flex items-center gap-3">
                <img src="/assets/github-logo.png" alt="" class="w-10">
                <h1 class="font-semibold">GitHub Issues Tracker</h1>
            </div>
            <div>
                <div class="relative w-72">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    </span>

                    <input 
                    type="text" 
                    class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-md leading-5 bg-white placeholder-gray-500 focus:outline-none focus:ring-1 focus:ring-blue-500 sm:text-sm" 
                    placeholder="Search" data-search
                    >
                </div>
            </div>
        </nav>
    </header>
    <main class="max-w-[90%] m-auto">
        <div class="w-full h-[88px] bg-white mt-[60px] shadow rounded-xl flex items-center px-5 gap-3">
            <button onclick="allContainer()" class="" id="all-issue">All</button>
            <button onclick="openedContainer()" class="" id="open-issue">Open</button>
            <button onclick="closedContainer()" class="" id="close-issue">Close</button>
        </div>
        <div>
            <div class="w-full h-[88px] bg-white mt-5 shadow rounded-t-xl flex items-center px-5 gap-3">
                <div class="flex items-center justify-between w-full">
                    <div class="flex items-center gap-3">
                        <div class="p-2 bg-purple-100 rounded-full"><img src="assets/Aperture.png" alt=""></div>
                        <div>
                            <h1 class="font-semibold text-xl"><span id="Issue-counter">0</span> Issues</h1>
                            <p class="text-[#64748B]">Track and manage your project issues</p>
                        </div>
                    </div>

                    <div class="flex items-center gap-5">
                        <div class="flex items-center gap-2">
                            <div class="w-3 h-3 bg-green-600 rounded-full"></div>
                            <p>Open</p>
                        </div>
                        <div class="flex items-center gap-2">
                            <div class="w-3 h-3 bg-purple-600 rounded-full"></div>
                            <p>Closed</p>
                        </div>
                    </div>
                    
                </div>
            </div>



                <div id="main-container" class="p-5 grid gap-4 shadow rounded-b-2xl grid-cols-1 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-4">
                    
                </div>

                <div id="loadingSpinner" class="h-[60vh] hidden justify-center items-center">
                    <span class="loading loading-spinner loading-xl text-blue-600"></span>
                </div>

                <div id="open-container" class="p-5  gap-4 shadow rounded-b-2xl grid-cols-1 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-4 hidden">
                    
                </div>

                <div id="close-container" class="p-5 gap-4 shadow rounded-b-2xl grid-cols-1 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-4 hidden">
                    
                </div>

                <div class="h-20"></div>
            </div>
        </div>
    </main>
    <script src="JS/main.js"></script>
</body>
</html>
