<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main | Github Issue Tracker</title>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap');

        *{
            font-family: "Geist", sans-serif;
        }

    </style>
</head>
<body class="bg-[#F8FAFC]">
    <header>
        <nav class="h-18 px-15 flex items-center justify-between shadow-xs bg-white">
            <div class="flex items-center gap-3">
                <img src="/assets/github-logo.png" alt="" class="w-10">
                <h1 class="font-semibold">GitHub Issues Tracker</h1>
            </div>
            <div></div>
        </nav>
    </header>
    <main class="max-w-[90%] m-auto">
        <div class="w-full h-[88px] bg-white mt-[60px] shadow rounded-xl flex items-center px-5 gap-3">
            <button class="border border-[#E4E4E7] rounded w-[120px] h-10 text-[#64748B] hover:cursor-pointer">All</button>
            <button class="border border-[#E4E4E7] rounded w-[120px] h-10 text-[#64748B] hover:cursor-pointer">Open</button>
            <button class="border border-[#E4E4E7] rounded w-[120px] h-10 text-[#64748B] hover:cursor-pointer">Close</button>
        </div>
        <div>
            <div class="w-full h-[88px] bg-white mt-5 shadow rounded-t-xl flex items-center px-5 gap-3">
                <div class="flex items-center justify-between w-full">
                    <div class="flex items-center gap-3">
                        <div class="p-2 bg-purple-100 rounded-full"><img src="assets/Aperture.png" alt=""></div>
                        <div>
                            <h1 class="font-semibold text-xl">50 Issues</h1>
                            <p class="text-[#64748B]">Track and manage your project issues</p>
                        </div>
                    </div>

                    <div class="flex items-center gap-5">
                        <div class="flex items-center gap-2">
                            <div class="w-3 h-3 bg-green-600 rounded-full"></div>
                            <p>Open</p>
                        </div>
                        <div class="flex items-center gap-2">
                            <div class="w-3 h-3 bg-purple-600 rounded-full"></div>
                            <p>Closed</p>
                        </div>
                    </div>
                    
                </div>
            </div>
            <div id="main-container" class="p-5 grid grid-cols-1 sm:grid-cols-4 shadow">
                <div class="shadow bg-white rounded">

                    <div class="flex items-center justify-between p-5">
                        <img src="/assets/Open-Status.png" alt="">
                        <div class="rounded-full px-7 py-1 bg-red-200 text-red-500 text-[15px]">HIGH</div>
                    </div>

                    <div class="px-5">
                        <p class="font-semibold text-2xl mb-3">Fix navigation menu on mobile devices</p>
                        <p class="line-clamp-2 text-[#64748B] mb-4">The navigation menu doesn't collapse properly on mobile devices</p>

                        <div class="flex items-center gap-2 pb-5">
                            <div class="rounded-full px-3 py-1 bg-red-200 text-red-500 text-[15px] flex items-center gap-1"><img src="assets/Vector (1).png" alt=""> BUG</div>

                            <div class="rounded-full px-3 py-1 bg-orange-200 text-orange-500 text-[15px] flex items-center gap-1"><img src="assets/Vector.png" alt=""> HELP WANTED</div>
                        </div>
                        </div>

                        <div class="border-t border-gray-200 p-5">
                            <p class="text-[#64748B] pb-1">#1 by john_doe</p>
                            <p class="text-[#64748B]">1/15/2024</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="JS/main.js"></script>
</body>
</html>
